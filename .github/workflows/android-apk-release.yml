name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        env:
          BUILD_PROFILE: ${{ github.event.inputs.profile || 'preview' }}
        run: |
          eas build --platform android --profile "$BUILD_PROFILE" --non-interactive --wait --json > eas-build-result.json
          cat eas-build-result.json

      - name: Download build artifact
        run: |
          BUILD_URL=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('eas-build-result.json','utf8')); const build=Array.isArray(data)?data[0]:data; const url=build?.artifacts?.buildUrl || ''; process.stdout.write(url);")
          if [ -z "$BUILD_URL" ]; then
            echo "Could not find artifacts.buildUrl in EAS result"
            exit 1
          fi
          echo "Build URL: $BUILD_URL"
          mkdir -p prototypes
          curl -L "$BUILD_URL" -o prototypes/reformed-church.apk
          ls -lh prototypes/reformed-church.apk

      - name: Create release tag metadata
        run: |
          TAG="apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "RELEASE_NAME=Android APK $TAG" >> $GITHUB_ENV

      - name: Publish GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          files: prototypes/reformed-church.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.

      - name: Deploy download site to Netlify (optional)
        if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx netlify deploy --prod --dir=prototypes --site "$NETLIFY_SITE_ID" --message "APK deploy from GitHub Actions run $GITHUB_RUN_ID"

      - name: Netlify deploy skipped note
        if: ${{ secrets.NETLIFY_AUTH_TOKEN == '' || secrets.NETLIFY_SITE_ID == '' }}
        run: |
          echo "NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID not set. APK was built and released, but Netlify deploy was skipped."
