name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Collect APK
        run: |
          mkdir -p prototypes
          cp android/app/build/outputs/apk/debug/app-debug.apk prototypes/reformed-church.apk
          ls -lh prototypes/reformed-church.apk

      - name: Create release tag metadata
        run: |
          TAG="apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "RELEASE_NAME=Android APK $TAG" >> $GITHUB_ENV

      - name: Publish GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          files: prototypes/reformed-church.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.

      - name: Deploy download site to Netlify (optional)
        if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx netlify deploy --prod --dir=prototypes --site "$NETLIFY_SITE_ID" --message "APK deploy from GitHub Actions run $GITHUB_RUN_ID"

      - name: Netlify deploy skipped note
        if: ${{ secrets.NETLIFY_AUTH_TOKEN == '' || secrets.NETLIFY_SITE_ID == '' }}
        run: |
          echo "NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID not set. APK was built and released, but Netlify deploy was skipped."
